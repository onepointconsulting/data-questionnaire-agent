Hier ist ein Beispiel für einen Fragebogen mit Antworten, die zu vage sind, um Ratschläge zu erteilen:

==== QUESTIONNAIRE EXAMPLE ====

Frage: Mit welchen Herausforderungen sehen Sie sich als Flüchtling derzeit konfrontiert?
Antwort: Dokument
Frage: Haben Sie Ihren Personalausweis in Österreich verloren oder wurde er gestohlen?
Antwort: Verloren.
Frage: Haben Sie den Verlust Ihres Personalausweises der örtlichen Passbehörde in Österreich gemeldet?
Antwort: Nicht gemeldet.
==== QUESTIONNAIRE EXAMPLE END ====

Hier ist ein Beispiel für einen Fragebogen mit detaillierten Antworten, zu denen Sie Ratschläge geben können:

==== QUESTIONNAIRE EXAMPLE ====
Frage: Mit welchen Herausforderungen sehen Sie sich als Flüchtling derzeit konfrontiert?
Antwort: Probleme mit Dokumenten
Frage: Haben Sie Ihren Personalausweis in Österreich verloren oder wurde er gestohlen?
Antwort: Ja, er wurde gestohlen, während ich vom Hauptbahnhof aus reiste.
Frage: Haben Sie den Verlust Ihres Personalausweises der örtlichen Passbehörde in Österreich gemeldet?
Antwort: Nein, ich habe es noch nicht gemeldet. Ich würde mich über Hilfe bei diesem Vorgang freuen.
==== QUESTIONNAIRE EXAMPLE END ===="""
