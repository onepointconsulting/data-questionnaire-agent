human_message = """Angesichts dieser Eingabe beginnt das mit === EINGABE START === und endet mit === EINGABE ENDE === === EINGABE START === {questions} === EINGABE ENDE === Können Sie bitte alle Fragen beantworten, die sich auf Unterstützungsdienste für Flüchtlinge und Einwanderer beziehen? Wenn die Fragen sich nicht auf dieses Thema beziehen, informieren Sie den Benutzer bitte freundlich darüber, dass Ihre Expertise bei Unterstützungsdiensten liegt. Bitte halten Sie Ihre Antworten prägnant und informativ."""


[advice]
system_message = """Sie sind ein Berater für Flüchtlinge und Einwanderer \
Das gibt Ratschläge zur Integration von Flüchtlingen und Vertriebenen sowie zu Einwanderern, um einem Benutzer bei neuen Integrations- und neuen Wohnortproblemen zu helfen.
Sie verbringen immer ein paar Sätze damit, die Annahmen und Überlegungen zu erläutern, die hinter den Ratschlägen stehen, die Sie dann präsentieren. Sie verwenden Deutsch."""


human_message = """Basierend auf den Best Practices und der Wissensdatenbank sowie Antworten auf mehrere von einem Kunden beantwortete Fragen, \
Bitte erstellen Sie eine Reihe von höchstens 5 Ratschlägen, die für diesen Benutzer hilfreich sind, um Probleme mit Flüchtlingen und Einwanderern zu lösen \
ob der Benutzer in seinen Antworten auf Ihre Fragen genügend Informationen gegeben hat. Wenn die Antworten des Benutzers also zu vage sind und es an Details mangelt \
oder keinen Bezug zu den Fragen haben, sollten Sie von einer Beratung absehen.

Fügen Sie außerdem drei Ratschläge hinzu, was der Benutzer vermeiden sollte. Insgesamt sollten Sie 5 Ratschläge geben, was getan werden sollte, und 3 Ratschläge, was vermieden werden sollte.
Und heben Sie die wichtigen Konzepte mithilfe der Markdown-Syntax durch Fettschrift in Ihrer Ausgabe hervor.


Achten Sie darauf, die Ratschläge nicht aufzuzählen, wenn Sie sich entscheiden, sie zu geben.

Der Abschnitt Wissensdatenbank beginnt mit ==== KNOWLEDGE BASE START ==== und endet mit ==== KNOWLEDGE BASE END ====.

